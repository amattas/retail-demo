tenant_id: null
subscription_id: null

auth:
  mode: azure_cli

workspace:
  name: retail-demo
  description: Microsoft Fabric retail demo workspace
  existing_id: null
  capacity_id: null
  capacity_name: null
  skip_capacity_state_validation: false
  role_assignments: []

lakehouse:
  name: retail_lakehouse
  enable_schemas: true

eventhouse:
  name: retail_eventhouse
  minimum_consumption_units: null
  kql_database_name: retail_kql
  kql_scripts:
    - 01-create-tables.kql
    - 02-create-ingestion-mappings.kql
    - 03-create-functions.kql
    - 04-create-materialized-views.kql
    - 06-ml-anomaly-detection.kql
    - 07-pricing-approval-tables.kql

eventstream:
  enabled: false
  name: retail_eventstream
  eventhub_connection_id: null
  eventhub_namespace: null
  eventhub_name: null
  consumer_group: "$Default"

notebooks:
  include:
    - core
  default_lakehouse_name: retail_lakehouse

powerbi:
  semantic_model_name: retail_model
  report_name: retail_model
  semantic_model_connection_id: null
  refresh_after_deploy: false

deployment:
  item_types_in_scope:
    - Lakehouse
    - Notebook
    - SemanticModel
    - Report
    - KQLQueryset
    - DataPipeline
    - MLExperiment
  publish_skip: false
  unpublish_skip: true
  orphan_exclude_regex: "^DO_NOT_DELETE_.*"
  feature_flags: []
