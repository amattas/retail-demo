name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  utility-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Install retail-setup
        working-directory: utility
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        working-directory: utility
        run: |
          pytest -q tests --ignore=tests/generation --ignore=tests/test_e2e_local.py
          pytest -q tests/generation/test_runtime.py tests/generation/test_spark_fixture.py tests/generation/test_schema_contract.py tests/generation/test_pricing.py tests/generation/test_writer.py
          pytest -q tests/generation/test_dims.py tests/generation/test_receipts.py tests/generation/test_returns.py tests/generation/test_online_orders.py tests/generation/test_promotions.py
          pytest -q tests/generation/test_inventory.py tests/generation/test_store_activity.py tests/generation/test_sensors.py tests/generation/test_marketing.py
          pytest -q tests/generation/test_engine.py
          pytest -q tests/generation/test_gold.py
          pytest -q tests/test_e2e_local.py

      - name: Notebook drift check
        working-directory: utility
        run: python scripts/build_notebooks.py --check

      - name: Repository contract tests
        run: |
          pip install pyyaml
          python -m pytest tests/deploy tests/scripts/test_workflow_references.py -q
        env:
          PYTHONPATH: .
