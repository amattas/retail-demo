name: Docs

on:
  push:
    branches: [main]
    tags:
      - '*.*.*'
      - 'v*.*.*'
    paths:
      - 'README.md'
      - 'contracts/retail-demo.json'
      - 'deploy/README.md'
      - 'deploy/config/deploy.yml'
      - 'deploy/scripts/**'
      - 'deploy/terraform/providers.tf'
      - 'docs/**'
      - 'fabric/**'
      - 'scripts/setup.py'
      - 'scripts/solution_manifest.py'
      - 'scripts/docs_versioning.py'
      - 'scripts/publish_versioned_docs.py'
      - 'tests/docs/**'
      - 'utility/README.md'
      - 'utility/pyproject.toml'
      - 'utility/src/retail_setup/**'
      - 'zensical.toml'
      - 'requirements-docs.in'
      - 'requirements-docs.txt'
      - 'requirements-test.in'
      - 'requirements-test.txt'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-gh-pages
  cancel-in-progress: false

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"
      - name: Install documentation tools
        run: |
          python -m pip install --disable-pip-version-check --require-hashes -r requirements-docs.txt
          python -m pip install --disable-pip-version-check --require-hashes -r requirements-test.txt
      - name: Validate documentation contracts
        run: python -m pytest tests/docs -q
      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Configure publish credentials
        env:
          GH_PAGES_TOKEN: ${{ github.token }}
        run: |
          git remote set-url origin "https://x-access-token:${GH_PAGES_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
      - name: Publish
        run: python scripts/publish_versioned_docs.py --push
