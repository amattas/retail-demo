# Docs — build the Docusaurus site and deploy to GitHub Pages on every push
# to main. Replaces the old MkDocs workflow (mkdocs-pages.yml); docs ship when
# they merge. Template reused from the pydmp docs-site workflow.
name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Build
        working-directory: website
        run: |
          npm ci
          npm run build
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: website/build
      - uses: actions/deploy-pages@v5
        id: deployment
